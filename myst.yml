version: 1
project:
  title: Krishnagopal Halder
  description: Personal website of Krishnagopal Halder, Research Scientist at ZALF, working on geospatial data science, machine learning, and crop yield forecasting.
  # thumbnail: images/profile-thumbnail.webp
  # authors:
  #   - name: Krishnagopal Halder
  #     email: Krishnagopal.Halder@zalf.de
  #     orcid: 0000-0000-0000-0000
  #     url: https://www.zalf.de
  #     affiliations:
  #       - Leibniz Centre for Agricultural Landscape Research (ZALF)
  copyright: '2026'
  keywords:
    - GeoAI
    - Machine Learning
    - Deep Learning
    - Remote Sensing
    - Agriculture
  # github: username/repo
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - cv.typ
    - cv.pdf
    - generate_cv.py
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - fonts/**
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  toc:
    - file: index.md
    - file: pages/about.md
    - file: pages/research.md
    - file: pages/software.md
    - file: pages/teaching.md
    - file: pages/talks.md
    - file: pages/awards.md
    - file: pages/services.md
    - file: pages/contact.md
    - file: pages/news.md
    - file: pages/blog.md
    - pattern: blog/*.md
      hidden: true
site:
  options:
    logo: logo.png
    logo_dark: logo.png
    favicon: fav.ico
    style: custom.css
    # analytics_google: G-XXXXXXXXXX
    folders: true
  # actions:
